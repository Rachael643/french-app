<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Élan: 30 Jours de Français</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-20">
    <nav class="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-center">L'Élan 🇫🇷</h1>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <div class="mb-6 bg-yellow-100 p-4 rounded-xl border-l-4 border-yellow-500 shadow-sm">
            <h2 class="text-xs font-bold uppercase text-yellow-700 tracking-widest">Le Mot du Jour</h2>
            <p class="text-xl font-black text-slate-800" id="daily-word">Étais</p>
            <p class="text-sm italic text-slate-600">"Fulfillment/Blossoming"</p>
        </div>

        <div id="progress-container" class="mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
            <span class="text-slate-500 uppercase text-xs font-bold tracking-widest">Progression</span>
            <div class="text-3xl font-black text-blue-600" id="stat-count">0 / 30</div>
        </div>

        <div id="days-grid" class="grid grid-cols-3 gap-3"></div>
    </main>

    <script>
        const daysGrid = document.getElementById('days-grid');
        const statCount = document.getElementById('stat-count');
        let completedDays = JSON.parse(localStorage.getItem('frenchProgress')) || [];

        function updateStats() {
            statCount.innerText = `${completedDays.length} / 30`;
            localStorage.setItem('frenchProgress', JSON.stringify(completedDays));
        }

        for (let i = 1; i <= 30; i++) {
            const btn = document.createElement('button');
            const isDone = completedDays.includes(i);
            btn.className = `h-24 rounded-2xl border-2 flex flex-col items-center justify-center font-bold text-lg transition-all active:scale-95
                ${isDone ? 'bg-green-100 border-green-500 text-green-700' : 'bg-white border-slate-200 text-slate-700'}`;
            btn.innerHTML = `<span>Jour</span><span>${i}</span>`;
            
            btn.onclick = () => {
                if (!completedDays.includes(i)) {
                    completedDays.push(i);
                    btn.classList.replace('bg-white', 'bg-green-100');
                    btn.classList.replace('border-slate-200', 'border-green-500');
                    btn.classList.replace('text-slate-700', 'text-green-700');
                } else {
                    completedDays = completedDays.filter(d => d !== i);
                    btn.classList.replace('bg-green-100', 'bg-white');
                    btn.classList.replace('border-green-500', 'border-slate-200');
                    btn.classList.replace('text-green-700', 'text-slate-700');
                }
                updateStats();
            };
            daysGrid.appendChild(btn);
        }
        updateStats();
    </script>
</body>
</html>
