<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Élan: 30 Day French</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-card { transition: transform 0.2s; }
        .day-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-20">
    <nav class="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-center">L'Élan 🇫🇷</h1>
        <p class="text-center text-sm opacity-90">A2 French Challenge</p>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <div id="progress-container" class="mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
            <span class="text-slate-500 uppercase text-xs font-bold tracking-widest">Your Progress</span>
            <div class="text-3xl font-black text-blue-600" id="stat-count">0 / 30</div>
        </div>

        <div id="days-grid" class="grid grid-cols-3 gap-3">
            </div>
    </main>

    <script>
        const daysGrid = document.getElementById('days-grid');
        const statCount = document.getElementById('stat-count');
        let completedDays = JSON.parse(localStorage.getItem('frenchProgress')) || [];

        function updateStats() {
            statCount.innerText = `${completedDays.length} / 30`;
            localStorage.setItem('frenchProgress', JSON.stringify(completedDays));
        }

        for (let i = 1; i <= 30; i++) {
            const btn = document.createElement('button');
            const isDone = completedDays.includes(i);
            
            btn.className = `day-card h-24 rounded-2xl border-2 flex flex-col items-center justify-center font-bold text-lg 
                ${isDone ? 'bg-green-100 border-green-500 text-green-700' : 'bg-white border-slate-200 text-slate-700'}`;
            
            btn.innerHTML = `<span>Jour</span><span>${i}</span>`;
            
            btn.onclick = () => {
                if (!completedDays.includes(i)) {
                    completedDays.push(i);
                    btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                    btn.classList.remove('bg-white', 'border-slate-200', 'text-slate-700');
                    alert(`Bravo ! Jour ${i} complété. Ask Gemini for your next lesson!`);
                } else {
                    completedDays = completedDays.filter(d => d !== i);
                    btn.classList.remove('bg-green-100', 'border-green-500', 'text-green-700');
                    btn.classList.add('bg-white', 'border-slate-200', 'text-slate-700');
                }
                updateStats();
            };
            daysGrid.appendChild(btn);
        }
        updateStats();
    </script>
</body>
</html>
